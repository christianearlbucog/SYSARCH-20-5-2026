<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - CCS Sit-in Monitoring</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-page: #eef4ff;
            --bg-card: #ffffff;
            --bg-soft: #f8fbff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.14);
            --border: rgba(148, 163, 184, 0.24);
            --shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        }
        [data-theme="dark"] {
            --bg-page: #090b16;
            --bg-card: #111827;
            --bg-soft: #161d36;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #60a5fa;
            --accent-soft: rgba(96, 165, 250, 0.16);
            --border: rgba(148, 163, 184, 0.12);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 24%), radial-gradient(circle at 100% 16%, rgba(96, 165, 250, 0.08), transparent 18%), linear-gradient(135deg, #eef4ff 0%, #f8fafc 100%);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .theme-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.3);
            color: var(--text-main);
            border-radius: 50%;
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .theme-toggle-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 1);
        }

        [data-theme="dark"] .navbar {
            background: rgba(8, 11, 22, 0.88) !important;
            border-color: rgba(255,255,255,0.08) !important;
        }
        [data-theme="dark"] .theme-toggle-btn {
            background: rgba(15, 23, 42, 0.95);
            border-color: rgba(255,255,255,0.12);
            color: #cbd5e1;
        }

        .split-wrapper {
            display: flex;
            min-height: calc(100vh - 70px);
            gap: 24px;
            padding: 24px 28px 36px;
        }

        .leaderboard-panel {
            width: 55%;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 44px 28px 36px;
            position: relative;
            overflow: hidden;
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        [data-theme="dark"] .leaderboard-panel {
            background: var(--bg-soft) !important;
        }

        .lb-logo {
            width: 130px;
            height: 130px;
            object-fit: contain;
            border-radius: 50%;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .lb-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            z-index: 1;
        }

        .lb-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 22px;
            z-index: 1;
        }

        .lb-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 26px;
            position: relative;
            z-index: 1;
            justify-content: center;
            flex-wrap: wrap;
        }
        .lb-filter-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--bg-soft);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .lb-filter-btn.active,
        .lb-filter-btn:hover {
            background: var(--accent-soft);
            border-color: transparent;
            color: var(--accent);
            transform: translateY(-1px);
        }

        .podium-wrap {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 460px;
            margin: 0 auto 32px auto;
            position: relative;
            z-index: 1;
        }
        .podium-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 120px;
        }
        .podium-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(59,130,246,0.18);
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .podium-avatar.rank1 {
            width: 86px;
            height: 86px;
            border-color: #facc15;
            box-shadow: 0 0 22px rgba(250,204,21,0.3);
        }
        .podium-avatar.rank2 { border-color: #adb5bd; }
        .podium-avatar.rank3 { border-color: #cd7f32; }
        [data-theme="dark"] .podium-avatar {
            background: #2a2d4a !important;
        }

        .podium-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        [data-theme="dark"] .podium-name {
            color: var(--text-main) !important;
        }
        .podium-course {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .podium-pts {
            font-size: 12px;
            color: #2563eb;
            margin-top: 6px;
            font-weight: 700;
        }

        .lb-list {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 220px;
            overflow-y: auto;
        }
        .lb-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .lb-row:hover {
            transform: translateY(-1px);
            background: white;
        }
        .lb-rank {
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            width: 28px;
            text-align: center;
        }
        .lb-row-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }
        .lb-row-info { flex: 1; min-width: 0; }
        .lb-row-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
        }
        .lb-row-course { font-size: 11px; color: var(--text-muted); }
        .lb-row-pts { font-size: 12px; color: #2563eb; font-weight: 700; white-space: nowrap; }

        .lb-empty {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            padding: 20px;
            width: 100%;
        }

        .welcome-panel {
            width: 45%;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: background 0.3s ease;
            padding: 44px 32px;
            border-radius: 32px;
            box-shadow: var(--shadow);
        }
        [data-theme="dark"] .welcome-panel {
            background: var(--bg-soft) !important;
        }
        .large-logo {
            width: 160px;
            height: auto;
            margin-bottom: 26px;
            border-radius: 50%;
            border: 2px solid rgba(59,130,246,0.24);
            filter: drop-shadow(0 10px 30px rgba(59,130,246,0.16));
        }
        .welcome-text {
            font-size: 30px;
            color: var(--text-main);
            margin: 0 0 14px;
            font-weight: 700;
            line-height: 1.2;
        }
        .sub-text {
            font-size: 16px;
            color: var(--text-muted);
            margin: 0 0 30px;
            line-height: 1.7;
            max-width: 420px;
        }
        .btn-start {
            padding: 14px 30px;
            background: linear-gradient(135deg, #3b82f6 0%, #7c3aed 100%);
            color: #fff;
            border: none;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            position: relative;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 18px 40px rgba(59,130,246,0.22);
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 44px rgba(59,130,246,0.28);
        }
        .btn-start:active { transform: translateY(0); }
        .btn-start::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        .btn-start:hover::after { transform: translateX(100%); }
        [data-theme="dark"] .btn-start {
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
        }

        ::-webkit-scrollbar { width: 7px; height: 7px; }
        ::-webkit-scrollbar-track { background: var(--bg-soft); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 4px; }

        @media (max-width: 1024px) {
            .split-wrapper { flex-direction: column; padding: 18px 18px 28px; }
            .leaderboard-panel, .welcome-panel { width: 100%; }
            .welcome-panel { padding: 34px 24px; }
        }
        @media (max-width: 720px) {
            .navbar { padding: 0 18px; height: 64px; }
            .logo-text { font-size: 16px; }
            .btn-start { width: 100%; justify-content: center; }
            .lb-filters { gap: 8px; }
            .lb-filter-btn { padding: 10px 14px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-text"><i class="fa fa-desktop"></i> College of Computer Studies Sit-in Monitoring System</div>
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
            <i class="fa-solid fa-moon" id="themeIcon"></i>
        </button>
    </nav>

    <div class="split-wrapper">

        <!-- LEFT: LEADERBOARD -->
        <div class="leaderboard-panel">
            <img src="images/leaderboard.png" alt="CCS Logo" class="lb-logo" onerror="this.style.display='none'">
            <h2 class="lb-title">🏆Leaderboard</h2>
            <p class="lb-subtitle">Top Sit-in Students this period</p>

            <div class="lb-filters">
                <button class="lb-filter-btn active" style="font-family: 'Sora', sans-serif;" onclick="switchFilter(this, 'overall')">Overall</button>
                <button class="lb-filter-btn" style="font-family: 'Sora', sans-serif;" onclick="switchFilter(this, 'week')">This Week</button>
                <button class="lb-filter-btn" style="font-family: 'Sora', sans-serif;" onclick="switchFilter(this, 'today')">Today</button>
            </div>

            <div class="podium-wrap" id="podiumWrap">
                <div class="lb-empty">Loading leaderboard…</div>
            </div>

            <div class="lb-list" id="lbList"></div>
        </div>

        <!-- RIGHT: WELCOME -->
        <div class="welcome-panel">
            <img src="images/ccs.png" alt="CCS Logo" class="large-logo">
            <h1 class="welcome-text">Welcome to the CCS Sit-in Monitoring System</h1>
            <p class="sub-text">Managing student laboratory sessions with efficiency and security.</p>
            <a href="index.html" class="btn-start">Get Started <i class="fa fa-arrow-right"></i></a>
        </div>

    </div>

</body>
<script>
    /* ── Theme ── */
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const icon = document.getElementById('themeIcon');
        icon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('ccs_theme', next);
        applyTheme(next);
        const icon = document.getElementById('themeIcon');
        icon.style.transform = 'rotate(360deg)';
        icon.style.transition = 'transform 0.4s ease';
        setTimeout(() => { icon.style.transform = ''; icon.style.transition = ''; }, 400);
    }
    (function () { applyTheme(localStorage.getItem('ccs_theme') || 'light'); })();

    /* ── Leaderboard ── */
    let allData = [];

    async function loadLeaderboard() {
        try {
            const res = await fetch('http://localhost:3000/leaderboard');
            if (!res.ok) throw new Error('Failed');
            allData = await res.json();
            renderLeaderboard(allData);
        } catch (e) {
            document.getElementById('podiumWrap').innerHTML =
                '<div class="lb-empty">Could not load leaderboard.<br>Make sure the server is running.</div>';
        }
    }

    function switchFilter(btn, filter) {
        document.querySelectorAll('.lb-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderLeaderboard(allData);
    }

    function initials(first, last) {
        return ((first || '')[0] || '') + ((last || '')[0] || '');
    }

    function renderLeaderboard(data) {
        const podiumWrap = document.getElementById('podiumWrap');
        const lbList     = document.getElementById('lbList');

        if (!data || data.length === 0) {
            podiumWrap.innerHTML = '<div class="lb-empty">No data yet. Sit-ins will appear here.</div>';
            lbList.innerHTML = '';
            return;
        }

        const top3 = data.slice(0, 3);
        const rest = data.slice(3);

        const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);

        podiumWrap.innerHTML = '';
        podiumOrder.forEach((student) => {
            const rank = student === top3[0] ? 1 : student === top3[1] ? 2 : 3;
            const hrs  = student.totalMinutes ? (student.totalMinutes / 60).toFixed(1) : '0.0';

            const card = document.createElement('div');
            card.className = 'podium-card';

            const avatarContent = student.profilePhoto
                ? `<img src="${student.profilePhoto}" alt="" style="width:100%;height:100%;object-fit:cover;">`
                : initials(student.firstName, student.lastName);

            card.innerHTML = `
                ${rank === 1 ? '<div class="podium-crown">👑</div>' : '<div style="height:26px"></div>'}
                <div class="podium-avatar rank${rank}">${avatarContent}</div>
                <div class="podium-name">${student.firstName} ${student.lastName}</div>
                <div class="podium-course">${student.course || ''}</div>
                <div class="podium-pts">⭐ ${hrs}h</div>
                <div class="podium-block rank${rank}">${rank}</div>
            `;
            podiumWrap.appendChild(card);
        });

        lbList.innerHTML = '';
        rest.forEach((student, i) => {
            const rank = i + 4;
            const hrs  = student.totalMinutes ? (student.totalMinutes / 60).toFixed(1) : '0.0';
            const avatarContent = student.profilePhoto
                ? `<img src="${student.profilePhoto}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`
                : initials(student.firstName, student.lastName);

            const row = document.createElement('div');
            row.className = 'lb-row';
            row.innerHTML = `
                <span class="lb-rank">${rank}</span>
                <div class="lb-row-avatar">${avatarContent}</div>
                <div class="lb-row-info">
                    <div class="lb-row-name">${student.firstName} ${student.lastName}</div>
                    <div class="lb-row-course">${student.course || ''}</div>
                </div>
                <span class="lb-row-pts">⭐ ${hrs}h</span>
            `;
            lbList.appendChild(row);
        });
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
</script>
</html>
