<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CCS Sit-in Monitoring System</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <style>
        :root {
            --bg-page: #f1f5fb;
            --bg-panel: #ffffff;
            --bg-card: #ffffff;
            --bg-accent: #2f6df8;
            --bg-accent-soft: rgba(47,109,248,0.12);
            --text-main: #111827;
            --text-muted: #5f6777;
            --text-invert: #ffffff;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            --shadow: 0 25px 60px rgba(15, 23, 42, 0.12);
            --shadow-soft: 0 12px 40px rgba(15, 23, 42, 0.08);
            --radius: 28px;
            --transition: 0.28s ease;
        }
        [data-theme="dark"] {
            --bg-page: #070b14;
            --bg-panel: #0f172a;
            --bg-card: #111827;
            --bg-accent: #7c3aed;
            --bg-accent-soft: rgba(124,58,237,0.16);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --text-invert: #ffffff;
            --border-color: #1e293b;
            --input-bg: #111827;
            --shadow: 0 30px 70px rgba(15, 23, 42, 0.45);
            --shadow-soft: 0 18px 50px rgba(15, 23, 42, 0.32);
        }

        * {
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, rgba(47,109,248,0.16), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(124,58,237,0.12), transparent 24%),
                        var(--bg-page);
            color: var(--text-main);
            transition: background var(--transition), color var(--transition);
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 22px 36px;
            max-width: 1180px;
            margin: 0 auto;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(148,163,184,0.16);
        }
        [data-theme="dark"] .navbar {
            background: rgba(15, 23, 42, 0.88);
            border-color: rgba(148,163,184,0.16);
        }

        .logo-text {
            font-weight: 700;
            letter-spacing: -0.04em;
            font-size: 1rem;
            color: var(--text-main);
        }
        .logo-text i {
            margin-right: 10px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 16px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links a,
        .theme-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 999px;
            text-decoration: none;
            transition: transform var(--transition), background var(--transition), color var(--transition);
        }
        .nav-links a {
            color: var(--text-muted);
            padding: 10px 16px;
        }
        .nav-links a.active,
        .nav-links a:hover {
            color: var(--text-main);
            background: var(--bg-accent-soft);
        }

        .theme-toggle-btn {
            background: var(--bg-accent-soft);
            border: 1px solid transparent;
            padding: 10px 16px;
            cursor: pointer;
            color: var(--text-main);
        }
        .theme-toggle-btn:hover {
            transform: translateY(-1px);
        }

        .main-content {
            display: flex;
            gap: 24px;
            min-height: calc(100vh - 96px);
            padding: 24px 28px 36px;
            align-items: stretch;
        }

        .login-card {
            width: 50%;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-card);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr;
        }

        .card-image-panel {
            position: relative;
            background: linear-gradient(180deg, var(--bg-accent) 0%, rgba(47,109,248,0.88) 100%);
            display: none;
            place-items: center;
            padding: 40px 24px;
            text-align: center;
        }
        .card-image-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.28;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 38%);
        }
        .card-image-panel img,
        .card-image-panel h2,
        .card-image-panel p {
            position: relative;
            z-index: 1;
        }
        .card-image-panel img {
            width: clamp(180px, 70%, 240px);
            max-width: 240px;
            margin-bottom: 22px;
        }
        .card-image-panel h2 {
            margin: 0 0 12px;
            color: #f8fafc;
            font-size: 1.9rem;
            line-height: 1.1;
        }
        .card-image-panel p {
            margin: 0;
            color: rgba(248,250,252,0.88);
            font-size: 0.98rem;
        }

        .card-form-panel {
            padding: 44px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
            background: var(--bg-card);
        }

        /* ══════════════════════════════════════
           LEADERBOARD STYLES
        ══════════════════════════════════════ */
        .leaderboard-panel {
            width: 50%;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 44px 28px 36px;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        [data-theme="dark"] .leaderboard-panel {
            background: var(--bg-card) !important;
            border-color: var(--border-color) !important;
            box-shadow: var(--shadow);
        }

        .lb-logo {
            width: 110px;
            height: 110px;
            object-fit: contain;
            border-radius: 50%;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .lb-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            z-index: 1;
        }

        .lb-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 22px;
            z-index: 1;
        }

        .lb-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 26px;
            position: relative;
            z-index: 1;
            justify-content: center;
            flex-wrap: wrap;
        }
        .lb-filter-btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .lb-filter-btn.active,
        .lb-filter-btn:hover {
            background: var(--bg-accent-soft);
            border-color: transparent;
            color: var(--bg-accent);
            transform: translateY(-1px);
        }

        @keyframes podiumEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes rowEnter {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .podium-wrap {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            width: 100%;
            max-width: 360px;
            margin: 0 auto 28px auto;
            position: relative;
            z-index: 1;
        }
        .podium-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
            opacity: 0;
            animation: podiumEnter 0.7s ease forwards;
        }
        .podium-card:nth-child(1) { animation-delay: 0.16s; }
        .podium-card:nth-child(2) { animation-delay: 0.28s; }
        .podium-card:nth-child(3) { animation-delay: 0.40s; }
        .podium-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(59,130,246,0.18);
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
            margin-bottom: 10px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .podium-card:hover .podium-avatar {
            transform: translateY(-5px) scale(1.04);
        }
        .podium-avatar.rank1 {
            width: 72px;
            height: 72px;
            border-color: #facc15;
            box-shadow: 0 0 18px rgba(250,204,21,0.3);
        }
        .podium-avatar.rank2 { border-color: #adb5bd; }
        .podium-avatar.rank3 { border-color: #cd7f32; }
        [data-theme="dark"] .podium-avatar {
            background: #2a2d4a !important;
        }

        .podium-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        [data-theme="dark"] .podium-name {
            color: var(--text-main) !important;
        }
        .podium-course {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .podium-pts {
            font-size: 11px;
            color: var(--bg-accent);
            margin-top: 4px;
            font-weight: 700;
        }
        .podium-block {
            font-size: 10px;
            color: #94a3b8;
            margin-top: 2px;
        }

        .lb-list {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
        }
        .lb-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 14px;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            opacity: 0;
            transform: translateY(16px);
            animation: rowEnter 0.55s ease forwards;
        }
        .lb-row:nth-child(1) { animation-delay: 0.12s; }
        .lb-row:nth-child(2) { animation-delay: 0.18s; }
        .lb-row:nth-child(3) { animation-delay: 0.24s; }
        .lb-row:nth-child(4) { animation-delay: 0.30s; }
        .lb-row:nth-child(5) { animation-delay: 0.36s; }
        .lb-row:hover {
            transform: translateY(-2px);
            background: var(--bg-panel);
            box-shadow: var(--shadow-soft);
        }
        .lb-rank {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            width: 24px;
            text-align: center;
        }
        .lb-row-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }
        .lb-row-info { flex: 1; min-width: 0; }
        .lb-row-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
        }
        .lb-row-course { font-size: 10px; color: var(--text-muted); }
        .lb-row-pts { font-size: 11px; color: var(--bg-accent); font-weight: 700; white-space: nowrap; }

        .lb-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 20px;
            width: 100%;
        }

        .card-form-panel h4 {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }
        .card-form-panel h1 {
            margin: 0;
            font-size: 2.3rem;
            letter-spacing: -0.06em;
            line-height: 1.05;
            color: var(--text-main);
        }

        form {
            display: grid;
            gap: 18px;
        }

        .input-group {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px 18px;
            transition: border var(--transition), background var(--transition);
        }
        .input-group input {
            background: transparent;
            border: 0;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
            width: 100%;
        }
        .input-group input::placeholder {
            color: var(--text-muted);
        }
        .input-icon,
        .password-toggle {
            color: var(--text-muted);
            font-size: 1rem;
        }
        .password-toggle {
            cursor: pointer;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            color: var(--text-muted);
            font-size: 0.94rem;
        }
        .form-options input {
            accent-color: var(--bg-accent);
        }

        .login-button {
            width: 100%;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--bg-accent), #5b82ff);
            color: var(--text-invert);
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: transform var(--transition), filter var(--transition);
        }
        .login-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        .register-text {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .register-link {
            color: var(--bg-accent);
            font-weight: 700;
            text-decoration: none;
        }
        .register-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            .login-card,
            .leaderboard-panel {
                width: 100%;
            }
            .card-image-panel,
            .card-form-panel {
                padding: 32px 24px;
            }
        }

        @media (max-width: 620px) {
            .navbar {
                flex-wrap: wrap;
                justify-content: center;
                text-align: center;
            }
            .nav-links {
                justify-content: center;
                width: 100%;
            }
            .nav-links a,
            .theme-toggle-btn {
                padding: 10px 12px;
            }
            .input-group {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
            .form-options a {
                margin-top: 4px;
            }
            .card-image-panel {
                padding: 28px 18px;
            }
            .card-form-panel {
                padding: 28px 18px;
            }
            .card-image-panel h2 {
                font-size: 1.6rem;
            }
            .main-content {
                min-height: auto;
                padding: 28px 16px 36px;
            }
        }
    </style>
<body>
    <nav class="navbar">
        <div class="logo-text"><i class="fa fa-desktop"></i> CCS Sit-in Monitoring</div>
        <ul class="nav-links">
            <li><a href="home.html"><i class="fa fa-home"></i> Home</a></li>
            <li><a href="index.html" class="active"><i class="fa fa-right-to-bracket"></i> Login</a></li>
            <li><a href="register.html"><i class="fa fa-user-plus"></i> Register</a></li>
            <li>
                <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
                    <i class="fa-solid fa-moon" id="themeIcon"></i>
                    <span id="themeLabel">Theme</span>
                </button>
            </li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="login-card">
            <div class="card-image-panel">
                <img src="images/ccs.png" alt="CCS Logo">
                <div>
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue to the CCS Sit-in Monitoring System.</p>
                </div>
            </div>
            <div class="card-form-panel">
                <h4>Continue where you left off</h4>
                <h1>Sign In</h1>
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fa fa-user input-icon"></i>
                        <input type="text" id="loginID" placeholder="ID Number or Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fa fa-lock input-icon"></i>
                        <input type="password" id="passwordField" placeholder="Password" required>
                        <span class="password-toggle" onclick="toggleVisibility()">
                            <i class="fa fa-eye"></i>
                        </span>
                    </div>
                    <div class="form-options">
                        <label class="remember-me"><input type="checkbox"> Remember me</label>
                    </div>

                    <button type="submit" class="login-button"><i class="fa fa-right-to-bracket"></i> Login</button>
                    
                    <p class="register-text">Don't have an account? <a href="register.html" class="register-link">Sign Up</a></p>
                </form>
            </div>
        </div>

        <!-- LEADERBOARD PANEL -->
        <div class="leaderboard-panel">
            <img src="images/leaders.jpg" alt="Leaders Logo" class="lb-logo" onerror="this.style.display='none'">
            <h2 class="lb-title">Leaderboard</h2>
            <p class="lb-subtitle">Top Sit-in Students</p>

            <div class="lb-filters">
                <button class="lb-filter-btn active" style="font-family: 'Sora', sans-serif;" onclick="switchFilter(this, 'overall')">Overall</button>
                <button class="lb-filter-btn" style="font-family: 'Sora', sans-serif;" onclick="switchFilter(this, 'week')">This Week</button>
                <button class="lb-filter-btn" style="font-family: 'Sora', sans-serif;" onclick="switchFilter(this, 'today')">Today</button>
            </div>

            <div class="podium-wrap" id="podiumWrap">
                <div class="lb-empty">Loading leaderboard…</div>
            </div>

            <div class="lb-list" id="lbList"></div>
        </div>
    </div>

</body>
<script>
/* ══════════════════════════════════════
   DARK / LIGHT MODE
══════════════════════════════════════ */
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon  = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    if (theme === 'dark') {
        icon.className  = 'fa-solid fa-sun';
        label.textContent = 'Light';
    } else {
        icon.className  = 'fa-solid fa-moon';
        label.textContent = 'Dark';
    }
}
 
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next    = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ccs_theme', next);
    applyTheme(next);
 
    // Animate the icon on toggle
    const icon = document.getElementById('themeIcon');
    icon.style.transform = 'rotate(360deg)';
    icon.style.transition = 'transform 0.4s ease';
    setTimeout(() => { icon.style.transform = ''; icon.style.transition = ''; }, 400);
}
 
// Load saved theme on page start
(function() {
    const saved = localStorage.getItem('ccs_theme') || 'light';
    applyTheme(saved);
})();

/* ══════════════════════════════════════
   LEADERBOARD
══════════════════════════════════════ */
let allData = [];

async function loadLeaderboard() {
    try {
        const res = await fetch('http://localhost:3000/leaderboard');
        if (!res.ok) throw new Error('Failed');
        allData = await res.json();
        renderLeaderboard(allData);
    } catch (e) {
        document.getElementById('podiumWrap').innerHTML =
            '<div class="lb-empty">Could not load leaderboard.<br>Make sure the server is running.</div>';
    }
}

function switchFilter(btn, filter) {
    document.querySelectorAll('.lb-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLeaderboard(allData);
}

function initials(first, last) {
    return ((first || '')[0] || '') + ((last || '')[0] || '');
}

function renderLeaderboard(data) {
    const podiumWrap = document.getElementById('podiumWrap');
    const lbList     = document.getElementById('lbList');

    if (!data || data.length === 0) {
        podiumWrap.innerHTML = '<div class="lb-empty">No data yet. Sit-ins will appear here.</div>';
        lbList.innerHTML = '';
        return;
    }

    const top3 = data.slice(0, 3);
    const rest = data.slice(3);

    const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);

    podiumWrap.innerHTML = '';
    podiumOrder.forEach((student) => {
        const rank = student === top3[0] ? 1 : student === top3[1] ? 2 : 3;
        const hrs  = student.totalMinutes ? (student.totalMinutes / 60).toFixed(1) : '0.0';

        const card = document.createElement('div');
        card.className = 'podium-card';

        const avatarContent = student.profilePhoto
            ? `<img src="${student.profilePhoto}" alt="" style="width:100%;height:100%;object-fit:cover;">`
            : initials(student.firstName, student.lastName);

        card.innerHTML = `
            ${rank === 1 ? '<div style="font-size:20px;margin-bottom:4px;">👑</div>' : '<div style="height:28px"></div>'}
            <div class="podium-avatar rank${rank}">${avatarContent}</div>
            <div class="podium-name">${student.firstName} ${student.lastName}</div>
            <div class="podium-course">${student.course || ''}</div>
            <div class="podium-pts">⭐ ${hrs}h</div>
        `;
        podiumWrap.appendChild(card);
    });

    lbList.innerHTML = '';
    rest.forEach((student, i) => {
        const rank = i + 4;
        const hrs  = student.totalMinutes ? (student.totalMinutes / 60).toFixed(1) : '0.0';
        const avatarContent = student.profilePhoto
            ? `<img src="${student.profilePhoto}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`
            : initials(student.firstName, student.lastName);

        const row = document.createElement('div');
        row.className = 'lb-row';
        row.innerHTML = `
            <span class="lb-rank">${rank}</span>
            <div class="lb-row-avatar">${avatarContent}</div>
            <div class="lb-row-info">
                <div class="lb-row-name">${student.firstName} ${student.lastName}</div>
                <div class="lb-row-course">${student.course || ''}</div>
            </div>
            <span class="lb-row-pts">⭐ ${hrs}h</span>
        `;
        lbList.appendChild(row);
    });
}

loadLeaderboard();
setInterval(loadLeaderboard, 30000);

function toggleVisibility() {
    const passwordInput = document.getElementById("passwordField");
    const toggleIcon = document.querySelector(".password-toggle i");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.classList.remove("fa-eye");
        toggleIcon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        toggleIcon.classList.remove("fa-eye-slash");
        toggleIcon.classList.add("fa-eye");
    }
}

const form = document.querySelector('#loginForm');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const loginInput = document.getElementById('loginID').value.trim().toLowerCase();
    const password = document.getElementById('passwordField').value.trim();

    if (loginInput === "admin" && password === "admin123") {
        sessionStorage.setItem("adminWelcomeShown", "false");
        
        Swal.fire({
            icon: "success",
            title: "Welcome, Admin!",
            text: "Welcome back, Admin. Preparing Sit-In Monitoring System...",
            timer: 1500,
            showConfirmButton: false
        }).then(() => {

            window.location.href = "admindashboard.html";
        });
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginInput, password })
        });

        const data = await response.json();

        if (response.ok) {

            const fullName = `${data.user.firstName} ${data.user.lastName}`;
            localStorage.setItem("userName", fullName);

            localStorage.setItem("loggedInId", data.user.idNumber);
            localStorage.setItem("sessionExpiry", Date.now() + 10 * 60 * 1000);
            sessionStorage.setItem("justLoggedIn", "true");

            const firstName = data.user.firstName || "User";

            Swal.fire({
                icon: "success",
                title: `Login Successful, ${firstName}!`,
                text: "Welcome back!",
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "dashboard.html";
            });

        } else {
            Swal.fire({
                icon: "error",
                title: "Login Failed",
                text: data.message
            });
        }

    } catch (error) {
        console.error("Error:", error);
        Swal.fire({
            icon: "error",
            title: "Server Error",
            text: "Please ensure your backend is running."
        });
    }
});
</script>
