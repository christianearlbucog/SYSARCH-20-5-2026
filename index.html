<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CCS Sit-in Monitoring System</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <style>
        :root {
            --bg-page: #f1f5fb;
            --bg-panel: #ffffff;
            --bg-card: #ffffff;
            --bg-accent: #2f6df8;
            --bg-accent-soft: rgba(47,109,248,0.12);
            --text-main: #111827;
            --text-muted: #5f6777;
            --text-invert: #ffffff;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            --shadow: 0 25px 60px rgba(15, 23, 42, 0.12);
            --shadow-soft: 0 12px 40px rgba(15, 23, 42, 0.08);
            --radius: 28px;
            --transition: 0.28s ease;
        }
        [data-theme="dark"] {
            --bg-page: #070b14;
            --bg-panel: #0f172a;
            --bg-card: #111827;
            --bg-accent: #7c3aed;
            --bg-accent-soft: rgba(124,58,237,0.16);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --text-invert: #ffffff;
            --border-color: #1e293b;
            --input-bg: #111827;
            --shadow: 0 30px 70px rgba(15, 23, 42, 0.45);
            --shadow-soft: 0 18px 50px rgba(15, 23, 42, 0.32);
        }

        * {
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, rgba(47,109,248,0.16), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(124,58,237,0.12), transparent 24%),
                        var(--bg-page);
            color: var(--text-main);
            transition: background var(--transition), color var(--transition);
        }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 22px 36px;
            max-width: 1180px;
            margin: 0 auto;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(148,163,184,0.16);
        }
        [data-theme="dark"] .navbar {
            background: rgba(15, 23, 42, 0.88);
            border-color: rgba(148,163,184,0.16);
        }

        .logo-text {
            font-weight: 700;
            letter-spacing: -0.04em;
            font-size: 1rem;
            color: var(--text-main);
        }
        .logo-text i {
            margin-right: 10px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 16px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links a,
        .theme-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 999px;
            text-decoration: none;
            transition: transform var(--transition), background var(--transition), color var(--transition);
        }
        .nav-links a {
            color: var(--text-muted);
            padding: 10px 16px;
        }
        .nav-links a.active,
        .nav-links a:hover {
            color: var(--text-main);
            background: var(--bg-accent-soft);
        }

        .theme-toggle-btn {
            background: var(--bg-accent-soft);
            border: 1px solid transparent;
            padding: 10px 16px;
            cursor: pointer;
            color: var(--text-main);
        }
        .theme-toggle-btn:hover {
            transform: translateY(-1px);
        }

        .main-content {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 96px);
            padding: 36px 24px 48px;
        }

        .login-card {
            width: 100%;
            max-width: 980px;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-card);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 1fr 1.18fr;
        }

        .card-image-panel {
            position: relative;
            background: linear-gradient(180deg, var(--bg-accent) 0%, rgba(47,109,248,0.88) 100%);
            display: grid;
            place-items: center;
            padding: 40px 24px;
            text-align: center;
        }
        .card-image-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.28;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 38%);
        }
        .card-image-panel img,
        .card-image-panel h2,
        .card-image-panel p {
            position: relative;
            z-index: 1;
        }
        .card-image-panel img {
            width: clamp(180px, 70%, 240px);
            max-width: 240px;
            margin-bottom: 22px;
        }
        .card-image-panel h2 {
            margin: 0 0 12px;
            color: #f8fafc;
            font-size: 1.9rem;
            line-height: 1.1;
        }
        .card-image-panel p {
            margin: 0;
            color: rgba(248,250,252,0.88);
            font-size: 0.98rem;
        }

        .card-form-panel {
            padding: 44px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
            background: var(--bg-card);
        }

        .card-form-panel h4 {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }
        .card-form-panel h1 {
            margin: 0;
            font-size: 2.3rem;
            letter-spacing: -0.06em;
            line-height: 1.05;
            color: var(--text-main);
        }

        form {
            display: grid;
            gap: 18px;
        }

        .input-group {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px 18px;
            transition: border var(--transition), background var(--transition);
        }
        .input-group input {
            background: transparent;
            border: 0;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
            width: 100%;
        }
        .input-group input::placeholder {
            color: var(--text-muted);
        }
        .input-icon,
        .password-toggle {
            color: var(--text-muted);
            font-size: 1rem;
        }
        .password-toggle {
            cursor: pointer;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            color: var(--text-muted);
            font-size: 0.94rem;
        }
        .form-options input {
            accent-color: var(--bg-accent);
        }
        .forgot-pass {
            color: var(--bg-accent);
            text-decoration: none;
        }
        .forgot-pass:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--bg-accent), #5b82ff);
            color: var(--text-invert);
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: transform var(--transition), filter var(--transition);
        }
        .login-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        .register-text {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        .register-link {
            color: var(--bg-accent);
            font-weight: 700;
            text-decoration: none;
        }
        .register-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .login-card {
                grid-template-columns: 1fr;
            }
            .card-image-panel,
            .card-form-panel {
                padding: 32px 24px;
            }
        }

        @media (max-width: 620px) {
            .navbar {
                flex-wrap: wrap;
                justify-content: center;
                text-align: center;
            }
            .nav-links {
                justify-content: center;
                width: 100%;
            }
            .nav-links a,
            .theme-toggle-btn {
                padding: 10px 12px;
            }
            .input-group {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
            }
            .form-options a {
                margin-top: 4px;
            }
            .card-image-panel {
                padding: 28px 18px;
            }
            .card-form-panel {
                padding: 28px 18px;
            }
            .card-image-panel h2 {
                font-size: 1.6rem;
            }
            .main-content {
                min-height: auto;
                padding: 28px 16px 36px;
            }
        }
    </style>
<body>
    <nav class="navbar">
        <div class="logo-text"><i class="fa fa-desktop"></i> CCS Sit-in Monitoring</div>
        <ul class="nav-links">
            <li><a href="home.html"><i class="fa fa-home"></i> Home</a></li>
            <li><a href="index.html" class="active"><i class="fa fa-right-to-bracket"></i> Login</a></li>
            <li><a href="register.html"><i class="fa fa-user-plus"></i> Register</a></li>
            <li>
                <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
                    <i class="fa-solid fa-moon" id="themeIcon"></i>
                    <span id="themeLabel">Theme</span>
                </button>
            </li>
        </ul>
    </nav>

    <div class="main-content">
        <div class="login-card">
            <div class="card-image-panel">
                <img src="images/ccs.png" alt="CCS Logo">
                <div>
                    <h2>Welcome Back</h2>
                    <p>Sign in to continue to the CCS Sit-in Monitoring System.</p>
                </div>
            </div>
            <div class="card-form-panel">
                <h4>Continue where you left off</h4>
                <h1>Sign In</h1>
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fa fa-user input-icon"></i>
                        <input type="text" id="loginID" placeholder="ID Number or Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fa fa-lock input-icon"></i>
                        <input type="password" id="passwordField" placeholder="Password" required>
                        <span class="password-toggle" onclick="toggleVisibility()">
                            <i class="fa fa-eye"></i>
                        </span>
                    </div>
                    <div class="form-options">
                        <label class="remember-me"><input type="checkbox"> Remember me</label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-button"><i class="fa fa-right-to-bracket"></i> Login</button>
                    
                    <p class="register-text">Don't have an account? <a href="register.html" class="register-link">Sign Up</a></p>
                </form>
            </div>

        </div>
    </div>

</body>
<script>
/* ══════════════════════════════════════
   DARK / LIGHT MODE
══════════════════════════════════════ */
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon  = document.getElementById('themeIcon');
    const label = document.getElementById('themeLabel');
    if (theme === 'dark') {
        icon.className  = 'fa-solid fa-sun';
        label.textContent = 'Light';
    } else {
        icon.className  = 'fa-solid fa-moon';
        label.textContent = 'Dark';
    }
}
 
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next    = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem('ccs_theme', next);
    applyTheme(next);
 
    // Animate the icon on toggle
    const icon = document.getElementById('themeIcon');
    icon.style.transform = 'rotate(360deg)';
    icon.style.transition = 'transform 0.4s ease';
    setTimeout(() => { icon.style.transform = ''; icon.style.transition = ''; }, 400);
}
 
// Load saved theme on page start
(function() {
    const saved = localStorage.getItem('ccs_theme') || 'light';
    applyTheme(saved);
})();

function toggleVisibility() {
    const passwordInput = document.getElementById("passwordField");
    const toggleIcon = document.querySelector(".password-toggle i");

    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.classList.remove("fa-eye");
        toggleIcon.classList.add("fa-eye-slash");
    } else {
        passwordInput.type = "password";
        toggleIcon.classList.remove("fa-eye-slash");
        toggleIcon.classList.add("fa-eye");
    }
}

const form = document.querySelector('#loginForm');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const loginInput = document.getElementById('loginID').value.trim().toLowerCase();
    const password = document.getElementById('passwordField').value.trim();

    if (loginInput === "admin" && password === "admin123") {
        sessionStorage.setItem("adminWelcomeShown", "false");
        
        Swal.fire({
            icon: "success",
            title: "Welcome, Admin!",
            text: "Welcome back, Admin. Preparing Sit-In Monitoring System...",
            timer: 1500,
            showConfirmButton: false
        }).then(() => {

            window.location.href = "admindashboard.html";
        });
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginInput, password })
        });

        const data = await response.json();

        if (response.ok) {

            const fullName = `${data.user.firstName} ${data.user.lastName}`;
            localStorage.setItem("userName", fullName);

            localStorage.setItem("loggedInId", data.user.idNumber);
            localStorage.setItem("sessionExpiry", Date.now() + 10 * 60 * 1000);
            sessionStorage.setItem("justLoggedIn", "true");

            const firstName = data.user.firstName || "User";

            Swal.fire({
                icon: "success",
                title: `Login Successful, ${firstName}!`,
                text: "Welcome back!",
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "dashboard.html";
            });

        } else {
            Swal.fire({
                icon: "error",
                title: "Login Failed",
                text: data.message
            });
        }

    } catch (error) {
        console.error("Error:", error);
        Swal.fire({
            icon: "error",
            title: "Server Error",
            text: "Please ensure your backend is running."
        });
    }
});
</script>
</html>
